<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slide Engine - Production Ready</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&family=Playfair+Display:wght@700&family=Fira+Code&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand">SLIDE</div>
            <nav>
                <button id="btn-add" class="btn-icon" title="เพิ่มสไลด์">+</button>
                <button id="btn-export" class="btn-icon danger" title="Export PDF">↓</button>
            </nav>
            <div id="tabs-container" class="tabs-vertical"></div>
        </aside>

        <main class="editor-container">
            <div class="pane-header">HTML / TAILWIND EDITOR</div>
            <textarea id="html-editor" spellcheck="false" placeholder="เขียน HTML ที่นี่..."></textarea>
        </main>

        <section class="preview-container" id="preview-area">
            <div class="pane-header">LIVE PREVIEW (16:9)</div>
            <div class="scale-anchor">
                <div id="canvas-wrapper" class="canvas-wrapper">
                    <iframe id="preview-frame"></iframe>
                </div>
            </div>
            <button id="btn-swap" class="mobile-only-btn">สลับหน้าจอ (Swap)</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
