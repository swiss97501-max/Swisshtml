<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slide Engine Pro</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    </head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand">SLIDE<span>PRO</span></div>
            <nav>
                <button id="btn-add" class="btn-icon" title="เพิ่มสไลด์">+</button>
                <button id="btn-export" class="btn-icon danger" title="Export PDF">↓</button>
            </nav>
            <div id="tabs-container" class="tabs-vertical"></div>
        </aside>

        <main class="editor-container">
            <div class="pane-header">HTML EDITOR</div>
            <textarea id="html-editor" spellcheck="false" placeholder="เขียนโค้ดที่นี่..."></textarea>
        </aside>

        <section class="preview-container" id="preview-area">
            <div class="pane-header">PREVIEW (16:9)</div>
            <div id="canvas-wrapper" class="canvas-wrapper">
                <iframe id="preview-frame"></iframe>
            </div>
            <button id="btn-swap" class="mobile-only-btn">Swap Editor/Preview</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
