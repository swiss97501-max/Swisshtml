<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Slide Engine</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h3>Slides</h3>
                <button id="add-slide-btn" class="btn-primary">+</button>
            </div>
            <ul id="slide-list"></ul>
            <div class="sidebar-footer">
                <button id="export-pdf-btn" class="btn-success">Export All PDF</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="toolbar">
                <button id="toggle-view" class="btn-secondary">Switch Editor/Preview</button>
                <span id="current-slide-title">Slide 1</span>
            </header>

            <div class="workspace">
                <section class="editor-section">
                    <textarea id="html-editor" placeholder="เขียน HTML/CSS/JS ที่นี่..."></textarea>
                </section>

                <section class="preview-section">
                    <iframe id="preview-frame"></iframe>
                </section>
            </div>
        </main>
    </div>

    <div id="pdf-render-container" style="position: absolute; left: -9999px; top: 0;"></div>

    <script src="script.js"></script>
</body>
</html>
