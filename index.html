<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Professional HTML Slide Engine</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <header class="app-header">
        <div class="brand">SLIDE ENGINE</div>
        <div class="toolbar">
            <button id="btn-add" class="btn btn-primary">Add Slide</button>
            <button id="btn-export" class="btn btn-danger">Export PDF</button>
        </div>
    </header>

    <nav class="tab-bar" id="tab-bar"></nav>

    <div class="mobile-nav-toggle">
        <button id="toggle-view">Switch Editor / Preview</button>
    </div>

    <main class="main-layout" id="main-layout">
        <section class="editor-container">
            <div class="pane-header">HTML / CSS Editor</div>
            <textarea id="code-editor" spellcheck="false"></textarea>
        </section>

        <section class="preview-container" id="preview-container">
            <div class="pane-header">Live Preview (16:9)</div>
            <div class="canvas-wrapper" id="canvas-wrapper">
                <iframe id="preview-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
            </div>
        </section>
    </main>

    <div id="loader" class="overlay hidden">
        <div class="spinner"></div>
        <p>Generating High-Quality PDF...</p>
    </div>

    <div class="hidden-worker">
        <iframe id="export-iframe"></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
