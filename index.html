<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Slide Engine v2</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <header>
        <div class="logo">Slide Engine</div>
        <div class="actions">
            <button id="btn-add-slide" class="btn primary">เพิ่มสไลด์</button>
            <button id="btn-export-pdf" class="btn danger">Export PDF</button>
        </div>
    </header>

    <nav class="tabs-container" id="tabs-container"></nav>

    <div class="mobile-toolbar">
        <button id="btn-toggle-view" class="btn outline">สลับ Editor / Preview</button>
    </div>

    <main class="workspace" id="workspace">
        <section class="pane editor-pane">
            <textarea id="html-editor" spellcheck="false" placeholder="เขียน HTML/Tailwind ที่นี่..."></textarea>
        </section>

        <section class="pane preview-pane" id="preview-pane">
            <div class="iframe-wrapper" id="iframe-wrapper">
                <iframe id="preview-frame"></iframe>
            </div>
        </section>
    </main>

    <div id="export-container" class="hidden-export">
        <iframe id="export-frame"></iframe>
    </div>

    <div id="loading-overlay" class="hidden">
        <div class="loader">กำลังสร้าง PDF... กรุณารอสักครู่</div>
    </div>

    <script src="script.js"></script>
</body>
</html>
