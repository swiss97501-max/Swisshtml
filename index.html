<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Swiss Slide</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="header">
    <div class="logo">SWISS</div>
    <div class="controls">
      <button id="addPageBtn">+ Page</button>
      <button id="exportBtn">Export PDF</button>
    </div>
  </div>

  <div class="mobile-toggle">
    <button id="showEditorBtn">HTML</button>
    <button id="showPreviewBtn">Preview</button>
  </div>

  <div id="pageTabs" class="tabs"></div>

  <div class="main">
    <div id="editorPane" class="pane">
      <textarea id="editor"></textarea>
    </div>

    <div id="previewPane" class="pane">
      <div id="preview"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
