<!DOCTYPE html>

<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slide Engine</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=IBM+Plex+Sans+Thai:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand">SLIDE</div>
            <nav>
                <button id="btn-add" class="btn-icon" title="เพิ่มสไลด์">+</button>
                <button id="btn-export" class="btn-icon danger" title="ดาวน์โหลด PDF">
                    <span class="btn-label">↓</span>
                    <span class="btn-spinner" style="display:none">⏳</span>
                </button>
            </nav>
            <div id="tabs-container" class="tabs-vertical"></div>
        </aside>

```
    <main class="editor-container" id="editor-area">
        <div class="pane-header">
            <span>HTML / TAILWIND EDITOR</span>
            <span id="slide-label" class="slide-counter">SLIDE 1</span>
        </div>
        <textarea id="html-editor" spellcheck="false" autocomplete="off"></textarea>
    </main>

    <section class="preview-container" id="preview-area">
        <div class="pane-header">
            <span>LIVE PREVIEW</span>
            <span id="slide-size">1280 × 720</span>
        </div>
        <div class="scale-anchor">
            <div id="canvas-wrapper" class="canvas-wrapper">
                <iframe id="preview-frame" sandbox="allow-scripts"></iframe>
            </div>
        </div>
        <button id="btn-swap" class="mobile-only-btn">⇄ สลับหน้าจอ</button>
    </section>
</div>

<!-- Export progress overlay -->
<div id="export-overlay" class="export-overlay" style="display:none">
    <div class="export-modal">
        <div class="export-spinner"></div>
        <div id="export-status">กำลังเตรียม PDF...</div>
        <div id="export-progress" class="export-progress-bar"><div id="export-fill"></div></div>
    </div>
</div>

<script src="script.js"></script>
```

</body>
</html>
