<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>HTML / Tailwind Editor</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- html2pdf.js สำหรับ Export PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">EDITOR</div>
    <button id="btn-add" class="btn-icon">+</button>
    <button id="btn-export" class="btn-icon">PDF</button>
    <div id="tabs-container" class="tabs-vertical"></div>
  </aside>

  <main class="editor-container" id="editor-area">
    <div class="pane-header">HTML / TAILWIND EDITOR</div>
    <textarea id="html-editor" spellcheck="false"></textarea>
  </main>

  <section class="preview-container" id="preview-area">
    <div class="pane-header">LIVE PREVIEW</div>
    <div class="scale-anchor">
      <div id="canvas-wrapper" class="canvas-wrapper">
        <iframe id="preview-frame"></iframe>
      </div>
    </div>
    <button id="btn-swap" class="mobile-only-btn">สลับหน้าจอ (Swap)</button>
  </section>
</div>

<script src="script.js"></script>
</body>
</html>
