<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Slide Engine - Ultimate Fix</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- 🆕 เพิ่ม Libraries สำหรับ Export PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <div class="brand">SLIDE</div>
            <nav>
                <button id="btn-add" class="btn-icon" title="เพิ่มสไลด์">+</button>
                <button id="btn-export" class="btn-icon danger" title="Export PDF">↓</button>
            </nav>
            <div id="tabs-container" class="tabs-vertical"></div>
        </aside>

        <main class="editor-container" id="editor-area">
            <div class="pane-header">HTML / TAILWIND EDITOR</div>
            <textarea id="html-editor" spellcheck="false"></textarea>
        </main>

        <section class="preview-container" id="preview-area">
            <div class="pane-header">LIVE PREVIEW</div>
            <div class="scale-anchor">
                <div id="canvas-wrapper" class="canvas-wrapper">
                    <iframe id="preview-frame"></iframe>
                </div>
            </div>
            <button id="btn-swap" class="mobile-only-btn">สลับหน้าจอ (Swap)</button>
        </section>
        
        <!-- 🆕 Hidden Container สำหรับ Render สไลด์ทั้งหมดเพื่อ Export -->
        <div id="pdf-export-container" style="position:fixed; left:-9999px; top:0; width:1280px;"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
