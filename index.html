<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Slide Engine</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <header>
        <div class="logo">🚀 HTML Slide Engine</div>
        <div class="actions">
            <button id="btn-add-slide" class="btn primary">➕ เพิ่มสไลด์</button>
            <button id="btn-export-pdf" class="btn danger">📄 Export PDF</button>
        </div>
    </header>

    <div class="tabs-container" id="tabs-container">
        </div>

    <div class="mobile-toolbar">
        <button id="btn-toggle-view" class="btn outline">📱 สลับมุมมอง Editor / Preview</button>
    </div>

    <main class="workspace" id="workspace">
        <section class="pane editor-pane" id="editor-pane">
            <textarea id="html-editor" placeholder="เขียน HTML, CSS, JS ของคุณที่นี่..."></textarea>
        </section>

        <section class="pane preview-pane" id="preview-pane">
            <div class="iframe-wrapper">
                <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin allow-modals"></iframe>
            </div>
        </section>
    </main>

    <div id="loading-overlay" class="hidden">
        <div class="loader">กำลังสร้าง PDF...</div>
    </div>

    <div id="export-container" class="hidden-export">
        <iframe id="export-frame" sandbox="allow-scripts allow-same-origin"></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
